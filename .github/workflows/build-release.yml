name: Build Release APK

# ─── When this runs ───────────────────────────────────────────────────────────
on:
  # Triggers when you publish a Release on GitHub (e.g. "v1.0.0")
  release:
    types: [ published ]

  # Also allow manual trigger
  workflow_dispatch:

# ─── The release build job ────────────────────────────────────────────────────
jobs:
  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Install NDK and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;26.3.11579264" \
          "cmake;3.22.1" \
          --sdk_root=$ANDROID_HOME

    - name: Clone LoopyMSE upstream
      run: git clone --depth=1 https://github.com/LoopyMSE/LoopyMSE.git /tmp/LoopyMSE

    - name: Copy LoopyMSE core
      run: |
        SRC=/tmp/LoopyMSE/src
        DST=app/src/main/jni/LoopyMSE
        cp -r $SRC/common $SRC/core $SRC/video $SRC/sound \
               $SRC/expansion $SRC/printer $SRC/log $DST/
        cp /tmp/LoopyMSE/assets/gamecontrollerdb.txt app/src/main/assets/
        cp /tmp/LoopyMSE/NOTICES.md app/src/main/assets/

    - name: Copy SDL2 Java files
      run: |
        SDL2_JAVA=app/src/main/jni/SDL2/android-project/app/src/main/java/org/libsdl/app
        mkdir -p app/src/main/java/org/libsdl/app
        cp $SDL2_JAVA/*.java app/src/main/java/org/libsdl/app/

    - name: Download stb_image_write.h
      run: |
        mkdir -p app/src/main/jni/stb
        curl -fSL https://raw.githubusercontent.com/nothings/stb/master/stb_image_write.h \
          -o app/src/main/jni/stb/stb_image_write.h

    - name: Make gradlew executable
      run: chmod +x gradlew

    # ── Decode the signing keystore from GitHub Secrets ───────────────────────
    # The keystore is stored as a base64-encoded secret.
    # See SIGNING.md for instructions on how to set this up.
    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

    # ── Build signed release APK ──────────────────────────────────────────────
    - name: Build release APK
      run: ./gradlew assembleRelease --stacktrace
      env:
        ANDROID_NDK_HOME:         ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        SIGNING_KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        SIGNING_STORE_FILE:       ${{ github.workspace }}/keystore.jks

    # ── Upload signed APK to the GitHub Release ───────────────────────────────
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Also upload as artifact (backup) ─────────────────────────────────────
    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: LoopyMseDroid-release-${{ github.ref_name }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90
