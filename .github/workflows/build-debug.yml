name: Build Debug APK

# ─── When this runs ───────────────────────────────────────────────────────────
on:
  # Every push to main branch
  push:
    branches: [ main, master ]

  # Every pull request
  pull_request:
    branches: [ main, master ]

  # Manual trigger from the GitHub website (Actions tab → Run workflow)
  workflow_dispatch:

# ─── The build job ────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest   # Free GitHub-hosted Linux runner

    steps:

    # ── 1. Check out YOUR repo ────────────────────────────────────────────────
    # submodules: recursive automatically pulls the SDL2 submodule
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive   # Pulls SDL2 automatically from .gitmodules

    # ── 2. Set up Java 17 ─────────────────────────────────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ── 3. Set up Gradle (handles the wrapper jar automatically) ──────────────
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # ── 4. Install Android NDK and CMake ──────────────────────────────────────
    # The ubuntu-latest runner has Android SDK pre-installed.
    # We just need to add NDK r26 and CMake 3.22.
    - name: Install NDK and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;26.3.11579264" \
          "cmake;3.22.1" \
          --sdk_root=$ANDROID_HOME

    # ── 5. Clone LoopyMSE core (the actual emulator engine) ───────────────────
    - name: Clone LoopyMSE upstream
      run: |
        git clone --depth=1 https://github.com/LoopyMSE/LoopyMSE.git /tmp/LoopyMSE

    # ── 6. Copy LoopyMSE core source files ────────────────────────────────────
    # We copy everything EXCEPT input/ and sdl/ which have Android modifications
    - name: Copy LoopyMSE core
      run: |
        SRC=/tmp/LoopyMSE/src
        DST=app/src/main/jni/LoopyMSE

        cp -r $SRC/common     $DST/common
        cp -r $SRC/core       $DST/core
        cp -r $SRC/video      $DST/video
        cp -r $SRC/sound      $DST/sound
        cp -r $SRC/expansion  $DST/expansion
        cp -r $SRC/printer    $DST/printer
        cp -r $SRC/log        $DST/log

        # Assets
        cp /tmp/LoopyMSE/assets/gamecontrollerdb.txt app/src/main/assets/
        cp /tmp/LoopyMSE/NOTICES.md                  app/src/main/assets/

        echo "Core files copied:"
        find $DST -name "*.cpp" -o -name "*.h" | wc -l

    # ── 7. Copy SDL2 Java files ───────────────────────────────────────────────
    # SDL2's Android Java layer must be in org/libsdl/app/
    - name: Copy SDL2 Java files
      run: |
        SDL2_JAVA=app/src/main/jni/SDL2/android-project/app/src/main/java/org/libsdl/app
        DST=app/src/main/java/org/libsdl/app
        mkdir -p $DST
        cp $SDL2_JAVA/*.java $DST/
        echo "SDL2 Java files:"
        ls $DST/

    # ── 8. Download stb_image_write ───────────────────────────────────────────
    - name: Download stb_image_write.h
      run: |
        mkdir -p app/src/main/jni/stb
        curl -fSL \
          https://raw.githubusercontent.com/nothings/stb/master/stb_image_write.h \
          -o app/src/main/jni/stb/stb_image_write.h
        echo "stb downloaded: $(wc -c < app/src/main/jni/stb/stb_image_write.h) bytes"

    # ── 9. Make gradlew executable ────────────────────────────────────────────
    - name: Make gradlew executable
      run: chmod +x gradlew

    # ── 10. Build the debug APK ───────────────────────────────────────────────
    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

    # ── 11. Upload the APK as a downloadable artifact ─────────────────────────
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: LoopyMseDroid-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30   # GitHub keeps it for 30 days

    # ── 12. Show build summary ────────────────────────────────────────────────
    - name: Build summary
      if: success()
      run: |
        APK=app/build/outputs/apk/debug/app-debug.apk
        SIZE=$(du -sh $APK | cut -f1)
        echo "✅ Build successful!"
        echo "APK size: $SIZE"
        echo "Download from: Actions tab → this run → Artifacts"
